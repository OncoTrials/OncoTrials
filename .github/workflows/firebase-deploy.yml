name: Deploy to Firebase

on:
  push:
    branches: [main]
    paths:
      - 'OncoTrials-Frontend/**'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm ci
        working-directory: OncoTrials-Frontend

      - name: Build
        run: npm run build
        working-directory: OncoTrials-Frontend

      - name: Deploy
        run: npx firebase-tools deploy --only hosting --project YOUR_PROJECT_ID --token ${{ secrets.FIREBASE_TOKEN }}
        working-directory: OncoTrials-Frontend